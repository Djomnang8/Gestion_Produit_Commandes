version: '3.8'

services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    networks:
      - shopping-net

  produit-service:
    build: ./produit-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/productdb
    depends_on:
      - eureka-server
    networks:
      - shopping-net
    volumes:
      - produit-data:/data

  commande-service:
    build: ./commande-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/commandedb
    depends_on:
      - eureka-server
      - produit-service
    networks:
      - shopping-net
    volumes:
      - commande-data:/data

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      - eureka-server
    networks:
      - shopping-net

networks:
  shopping-net:
    driver: bridge

volumes:
  produit-data:
  commande-data:
